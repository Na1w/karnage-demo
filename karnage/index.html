<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karnage</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: crosshair;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease-out;
            pointer-events: auto;
        }
        #start-btn {
            background: none;
            border: 2px solid #00ffcc;
            color: #00ffcc;
            padding: 15px 30px;
            font-size: 24px;
            font-family: inherit;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            cursor: pointer;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 25px rgba(0, 255, 204, 0.5); }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .info {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="start-btn">Press me to start!</div>
        <div class="info">Web-security requires page interaction before we can start the demo!</div>
    </div>

    <script>
        if (!navigator.gpu) {
            const btn = document.getElementById('start-btn');
            const info = document.querySelector('.info');
            if (btn) {
                btn.style.display = 'none';
                const errorMsg = document.createElement('div');
                errorMsg.style.color = '#ff4444';
                errorMsg.style.border = '2px solid #ff4444';
                errorMsg.style.padding = '15px 30px';
                errorMsg.style.fontSize = '20px';
                errorMsg.style.marginBottom = '20px';
                errorMsg.style.textAlign = 'center';
                errorMsg.innerText = 'ERROR: WebGPU not supported!';
                btn.parentNode.insertBefore(errorMsg, btn);
            }
            if (info) {
                info.innerHTML = 'This demo requires a modern browser with WebGPU (Chrome, Edge, or Firefox).';
                info.style.color = '#ff4444';
                info.style.opacity = '1';
            }
        }

        window.hideOverlay = function() {
            const overlay = document.getElementById('overlay');
            if (overlay) {
                overlay.style.opacity = '0';
                overlay.style.pointerEvents = 'none';
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 500);
            }
        };
    </script>
</body>
</html>
