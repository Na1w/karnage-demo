name: Build and Deploy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-native:
    name: Build Native on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libudev-dev pkg-config libx11-dev libxi-dev libxcursor-dev libxinerama-dev libxrandr-dev

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Release
      run: cargo build --release --verbose

    - name: Prepare Artifacts (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p dist
        cp target/release/karnage.exe dist/karnage-windows.exe

    - name: Prepare Artifacts (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p dist
        cp target/release/karnage dist/karnage-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: karnage-${{ matrix.os }}
        path: dist/

  build-web:
    name: Build Web (Trunk)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Download Trunk
      run: |
        wget -qO- https://github.com/trunk-rs/trunk/releases/latest/download/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-

    - name: Build Web
      run: |
        cd karnage
        ../trunk build --release --public-url /karnage-demo/

    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: karnage/dist/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-native]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
